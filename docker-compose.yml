version: "3.8"

services:
  backend:
    build: ./backend
    container_name: spring-api
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: next-app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
